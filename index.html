        function switchTab(tabIndex) {

                    tab.classList.add('active', 'bg-blue-600', 'text-white', 'shadow-sm');
                    tab.classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-700');

                    tab.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-700');
                }
            });
            currentTab = tabIndex;
            renderContent();

                                                </div>

                    initPhotoUpload();

                }, 30);
                
            } else {
                const serviceNames = ["Генератор комментов", "Генератор фото ФП", "Генератор GIF"];
                const serviceIcons = ["fa-comments", "fa-image", "fa-gif"];
                
                document.getElementById('main-content').innerHTML = `
                    <div class="max-w-[820px] mx-auto">
                        <div class="bg-white rounded-3xl border border-slate-200 p-10 text-center content-card">

                            </div>
                            <h2 class="text-3xl font-semibold tracking-tight">${serviceNames[currentTab - 1]}</h2>
                            <div class="inline-flex items-center gap-x-2 mt-3 mb-6 bg-purple-100 text-purple-600 px-4 py-1 rounded-2xl text-sm font-semibold">
                                <i class="fa-solid fa-clock"></i>
                                <span>В разработке • Релиз скоро</span>
                            </div>
                            <p class="text-slate-600 max-w-md mx-auto">Этот сервис находится в активной разработке. Следите за обновлениями!</p>

        /* ─────────────────────────────────────────
           PHOTO UPLOAD
        ───────────────────────────────────────── */
        function initPhotoUpload() {
            const zone = document.getElementById('photo-upload-zone');
            if (!zone) return;
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#0D6EFD'; });
            zone.addEventListener('dragleave', () => zone.style.borderColor = '#e2e8f0');
            zone.addEventListener('drop', e => {
                e.preventDefault(); zone.style.borderColor = '#e2e8f0';
                if (e.dataTransfer.files.length > 0) handlePhotoFile(e.dataTransfer.files[0]);
            });
        }
        
        function handlePhotoUpload(e) {
            if (e.target.files.length > 0) handlePhotoFile(e.target.files[0]);
        }
        
        function handlePhotoFile(file) {
            if (!file.type.startsWith('image/')) { showError('Пожалуйста, выберите изображение (JPG, PNG, WEBP)'); return; }
            photoFile = file;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const icon = document.getElementById('photo-icon');
                const thumb = document.getElementById('photo-thumb');
                const placeholder = document.getElementById('photo-placeholder');
                const filename = document.getElementById('photo-filename');
                if (icon) icon.classList.add('hidden');
                if (thumb) { thumb.src = ev.target.result; thumb.classList.remove('hidden'); }
                if (placeholder) placeholder.style.display = 'none';
                if (filename) { filename.style.display = 'block'; filename.innerHTML = `<i class="fa-solid fa-check text-emerald-500 mr-1"></i> ${file.name} (${(file.size/1024).toFixed(0)} KB)`; }
            };
            reader.readAsDataURL(file);
        }

        /* ─────────────────────────────────────────
           LOADING ANIMATION
        ───────────────────────────────────────── */
        let loadingTimer = null;
        function startLoadingAnimation() {
            const steps = ['step-photo', 'step-research', 'step-write', 'step-translate'];
            const delays = [0, 8000, 20000, 40000];
            steps.forEach((id, i) => {
                setTimeout(() => {
                    steps.forEach((sid, j) => {
                        const el = document.getElementById(sid);
                        if (!el) return;
                        if (j < i) el.className = 'loading-step done flex items-center gap-2';
                        else if (j === i) el.className = 'loading-step active flex items-center gap-2';
                        else el.className = 'loading-step pending flex items-center gap-2';
                    });
                }, delays[i]);
            });
        }

        /* ─────────────────────────────────────────
           FORM SUBMIT → n8n WEBHOOK
        ───────────────────────────────────────── */
        async function handleFormSubmit(event) {
            if (event) event.preventDefault();
            hideError();
            
            // Validate
            if (!photoFile) { showError('Пожалуйста, загрузите фото'); return; }
            const appName = document.getElementById('app-name').value.trim();
            const winAmount = document.getElementById('win-amount').value.trim();
            if (!appName) { showError('Введите название приложения'); return; }
            if (!winAmount) { showError('Введите сумму выигрыша'); return; }

            const geo = document.getElementById('geo-select').value;
            const storyLength = document.getElementById('story-length').value;
            const slotName = document.getElementById('slot-name').value.trim();
            const extraContext = document.getElementById('extra-context').value.trim();
            const newsResearcher = document.getElementById('news-researcher').checked;
            selectedGeo = geo;

            // Show loading
            setSubmitState(true);
            showLoading();
            startLoadingAnimation();

            // Build FormData
            const formData = new FormData();
            formData.append('photo', photoFile);
            formData.append('geo', geo);
            formData.append('appName', appName);
            formData.append('winAmount', winAmount);
            formData.append('length', storyLength);
            formData.append('slotName', slotName);
            formData.append('personalContext', extraContext);
            formData.append('newsResearcher', newsResearcher);

            try {
                const res = await fetch(WEBHOOK_GENERATE, {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`Ошибка n8n ${res.status}: ${errText.slice(0, 200)}`);
                }

                const data = await res.json();
                const original = data.originalStory || data.original || '';
                const russian  = data.translateStory || data.russian || '';

                if (!original) throw new Error('n8n вернул пустую историю. Проверьте workflow.');

                lastGenerated = { original, russian, geo, appName, winAmount };
                hideLoading();
                setSubmitState(false);
                showReviewUI(original, russian);

            } catch (err) {
                hideLoading();
                setSubmitState(false);
                showError('Ошибка: ' + err.message);
            }
        }

        /* ─────────────────────────────────────────
           REVIEW UI
        ───────────────────────────────────────── */
        function showReviewUI(originalText, russianText) {
            const empty   = document.getElementById('preview-empty');
            const review  = document.getElementById('preview-review');
            if (!empty || !review) return;
            
            empty.style.display = 'none';
            review.classList.remove('hidden');
            review.innerHTML = `
                <div class="text-center mb-4">
                    <div class="text-xl font-semibold text-slate-900">Всё ок?</div>
                    <div class="text-sm text-slate-500 mt-1">Если не ок — поправь</div>
                </div>
                
                <div class="mb-4">
                    <div class="text-xs font-semibold text-slate-500 mb-1.5 flex justify-between">
                        <span>Оригинальный текст</span>
                        <button onclick="copyText('orig-text')" class="text-blue-500 hover:text-blue-700 font-normal"><i class="fa-regular fa-copy mr-1"></i>Копировать</button>
                    </div>
                    <div id="orig-text" class="review-box text-sm text-slate-700 leading-relaxed max-h-[160px] overflow-auto whitespace-pre-wrap">${escapeHtml(originalText)}</div>
                </div>
                
                <div class="mb-4">
                    <div class="text-xs font-semibold text-slate-500 mb-1.5 flex justify-between">
                        <span>Перевод на русский</span>
                        <button onclick="copyText('ru-text')" class="text-blue-500 hover:text-blue-700 font-normal"><i class="fa-regular fa-copy mr-1"></i>Копировать</button>
                    </div>
                    <div id="ru-text" class="review-box text-sm text-slate-700 leading-relaxed max-h-[160px] overflow-auto whitespace-pre-wrap">${escapeHtml(russianText)}</div>
                </div>
                
                <div class="mb-4">
                    <div class="text-xs font-semibold text-slate-500 mb-1.5">Правки (необязательно)</div>
                    <textarea id="revision-prompt" rows="2" class="form-input w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm resize-y" placeholder="Что изменить? Например: добавь эмоций в начале..."></textarea>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="sendAction('approve')" class="flex-1 py-3 bg-gradient-to-r from-emerald-500 to-green-500 hover:from-emerald-600 hover:to-green-600 text-white font-semibold rounded-2xl text-sm flex items-center justify-center gap-x-2 shadow-lg shadow-emerald-500/25 active:scale-[0.985] transition-all">
                        <i class="fa-solid fa-check"></i> Одобрить
                    </button>
                    <button onclick="sendAction('regenerate')" class="flex-1 py-3 bg-white border-2 border-slate-200 hover:border-blue-400 text-slate-700 hover:text-blue-700 font-semibold rounded-2xl text-sm flex items-center justify-center gap-x-2 active:scale-[0.985] transition-all">
                        <i class="fa-solid fa-rotate"></i> Переписать
                    </button>
                </div>
            `;
        }

        /* ─────────────────────────────────────────
           APPROVE / REWRITE → n8n WEBHOOK
        ───────────────────────────────────────── */
        async function sendAction(action) {
            if (!lastGenerated) return;
            
            const revisionPrompt = document.getElementById('revision-prompt')?.value.trim() || '';
            
            if (action === 'regenerate' && !revisionPrompt) {
                showInlineError('Введите правки перед тем как отправить на доработку');
                return;
            }

            // Show mini-loader in review
            const review = document.getElementById('preview-review');
            const originalHTML = review.innerHTML;
            
            if (action === 'approve') {
                review.innerHTML = `
                    <div class="text-center py-6">
                        <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full spinner mx-auto mb-3"></div>
                        <div class="text-sm text-slate-500">Сохраняем в датасет…</div>
                    </div>`;
            } else {
                review.innerHTML = `
                    <div class="text-center py-6">
                        <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full spinner mx-auto mb-3"></div>
                        <div class="text-sm text-slate-500">Переписываем историю…</div>
                        <div class="text-xs text-slate-400 mt-1">30–60 секунд</div>
                    </div>`;
            }

            try {
                const payload = {
                    action: action,
                    'Оригинальный текст': lastGenerated.original,
                    'Перевод на русский': lastGenerated.russian,
                    revisionPrompt: revisionPrompt,
                    geo: lastGenerated.geo
                };

                const res = await fetch(WEBHOOK_ACTION, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                const data = await res.json();

                if (action === 'approve') {
                    showApproveSuccess(data.tag || '');
                } else {
                    // Rewrite returned new story
                    const newOriginal = data.originalStory || data.original || '';
                    const newRussian  = data.translateStory || data.russian || '';
                    lastGenerated.original = newOriginal;
                    lastGenerated.russian  = newRussian;
                    showReviewUI(newOriginal, newRussian);
                }

            } catch (err) {
                // On error - restore original review UI and show error
                review.innerHTML = originalHTML;
                showInlineError('Ошибка: ' + err.message);
            }
        }

        function showApproveSuccess(tag) {
            const card = document.getElementById('preview-card');
            card.innerHTML = `
                <div class="text-center py-10">
                    <div class="mx-auto w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-check text-emerald-600 text-3xl"></i>
                    </div>
                    <div class="font-semibold text-xl text-emerald-600">Готово!</div>
                    <p class="text-slate-600 mt-2 text-sm">История сохранена в датасет.${tag ? '<br><code class="text-xs bg-slate-100 px-2 py-0.5 rounded-lg mt-1 inline-block">' + escapeHtml(tag) + '</code>' : ''}</p>
                    <div class="mt-5 flex flex-col gap-2">
                        <button onclick="copyFinalStory()" class="mx-auto px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold rounded-2xl transition-all flex items-center gap-2">
                            <i class="fa-regular fa-copy"></i> Скопировать историю
                        </button>
                        <button onclick="renderContent()" class="mt-1 text-xs text-slate-500 hover:text-slate-700 mx-auto">Создать новую историю</button>
                    </div>
                </div>
            `;
        }

        /* ─────────────────────────────────────────
           HELPERS
        ───────────────────────────────────────── */
        function setSubmitState(loading) {
            const btn = document.getElementById('submit-btn');
            if (!btn) return;
            btn.disabled = loading;
            btn.innerHTML = loading
                ? `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spinner"></div><span>Генерируем…</span>`
                : `<i class="fa-solid fa-magic"></i><span>СГЕНЕРИРОВАТЬ ИСТОРИЮ</span>`;
        }

        function showLoading() {
            const empty   = document.getElementById('preview-empty');
            const loading = document.getElementById('preview-loading');
            const review  = document.getElementById('preview-review');
            if (empty)   empty.style.display = 'none';
            if (loading) loading.classList.remove('hidden');
            if (review)  review.classList.add('hidden');
        }

        function hideLoading() {
            const loading = document.getElementById('preview-loading');
            if (loading) loading.classList.add('hidden');
        }

        function showError(msg) {
            const box  = document.getElementById('error-msg');
            const text = document.getElementById('error-text');
            if (box && text) { text.textContent = msg; box.classList.remove('hidden'); }
        }

        function hideError() {
            const box = document.getElementById('error-msg');
            if (box) box.classList.add('hidden');
        }

        function showInlineError(msg) {
            const review = document.getElementById('preview-review');
            if (!review) return;
            let errDiv = review.querySelector('.inline-err');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.className = 'inline-err mt-3 p-3 bg-red-50 border border-red-200 rounded-2xl text-xs text-red-600';
                review.appendChild(errDiv);
            }
            errDiv.textContent = msg;
            setTimeout(() => { if (errDiv) errDiv.remove(); }, 4000);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function copyText(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            navigator.clipboard.writeText(el.innerText).then(() => {
                const btn = el.previousElementSibling?.querySelector('button');
                if (btn) {
                    const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-check mr-1 text-emerald-500"></i>Скопировано!';
                    setTimeout(() => { btn.innerHTML = orig; }, 1500);
                }
            });
        }

        function copyFinalStory() {
            if (!lastGenerated) return;
            const full = lastGenerated.original + '\n\n--- Перевод на русский ---\n\n' + lastGenerated.russian;
            navigator.clipboard.writeText(full).catch(() => {});
        }

        /* ─────────────────────────────────────────
           INIT
        ───────────────────────────────────────── */
        window.onload = function() {
            document.getElementById('tab-0').classList.add('active', 'bg-blue-600', 'text-white', 'shadow-sm');
            renderContent();
        };
    </script>
</body>
</html>
